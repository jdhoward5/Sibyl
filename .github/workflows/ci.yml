name: CI

# Fast, free regression check on every push/PR. Runs on GitHub-hosted Windows
# and macOS runners: it does NOT compile the custom CUDA backend and does NOT
# run the GPU smoke (no NVIDIA GPU / no real Metal headless run on hosted
# runners) — that's cut locally per platform (release.ps1 / release-mac.mjs).
# This just catches TS / logic / build regressions cheaply on both OSes.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest → x64 (CUDA/Vulkan); macos-latest → Apple Silicon (Metal).
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
