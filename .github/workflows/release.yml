name: Release

# Tag-driven release. Push a tag like `v0.1.0-beta.1` and this builds the
# NSIS installer and attaches it to a GitHub Release (marked pre-release).
#
# Runs on a SELF-HOSTED Windows runner — your machine — because the shipped
# artifact needs the custom from-source b9616 CUDA build (`npm run
# rebuild:llama`), which requires the CUDA Toolkit + VS Build Tools, and
# because we verify on a real GPU (`npm run smoke`) before publishing.
# Register the runner under repo Settings → Actions → Runners; it needs the
# labels [self-hosted, windows] (default) plus the CUDA/VS toolchain installed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload the installer

jobs:
  release:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      # Fail fast if the tag doesn't match package.json — electron-builder names
      # the installer from package.json version, not the tag, so a mismatch would
      # silently ship a mislabeled artifact.
      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          if ("v$pkg" -ne $tag) {
            Write-Error "Tag '$tag' does not match package.json version '$pkg' (expected 'v$pkg')."
            exit 1
          }
          Write-Host "Releasing v$pkg"

      # The self-hosted workspace persists between runs, so wipe stale build
      # output — otherwise prior tags' installers linger under release/ and get
      # swept into the upload glob below.
      - name: Clean previous build output
        shell: pwsh
        run: Remove-Item -Recurse -Force release, out -ErrorAction SilentlyContinue

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      # Compile the custom b9616 CUDA backend (gemma4 + newer archs). The slow
      # step: npm ci above wiped node_modules (and thus the previous
      # localBuilds), so this recompiles from clean (~tens of minutes).
      - name: Build custom llama.cpp CUDA backend
        run: npm run rebuild:llama

      - name: Typecheck & unit tests
        run: npm run typecheck && npm test

      # Real GPU verification on this machine before we ship the binary:
      # downloads a tiny model from HF, loads it on the GPU, streams a reply.
      - name: GPU smoke
        run: npm run smoke

      - name: Build installer
        run: npm run dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: release/**/*-setup.exe
