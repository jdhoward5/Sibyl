appId: com.sibyl.app
productName: Sibyl
directories:
  buildResources: build
  output: release/${version}
# node-llama-cpp ships prebuilt N-API binaries; no native rebuild is needed.
npmRebuild: false
files:
  - out/**/*
  - package.json
  # Trim dead weight from the packaged native deps. We ship a custom from-source
  # llama.cpp build (b9616) under llama/localBuilds — CUDA on Windows, Metal on
  # macOS — which adds newer-architecture support (e.g. gemma4) the prebuilt b8390
  # lacks, plus the matching prebuilt backends (CPU + Vulkan on Windows, CPU on
  # mac) as a fallback. We drop the rest:
  #  - win-x64-cuda-ext (~440 MB) only adds coverage for very old NVIDIA archs
  #  - arm64 *prebuilts* are useless on an x64 Windows build (no-op on a mac build,
  #    which legitimately ships @node-llama-cpp/mac-arm64-metal)
  - "!**/node_modules/@node-llama-cpp/win-x64-cuda-ext/**"
  - "!**/node_modules/@node-llama-cpp/win-arm64/**"
  # The top-level llama.cpp *source* checkout (~153 MB) that `rebuild:llama`
  # downloads to build from — only the compiled `localBuilds/*/Release` output is
  # needed at runtime. Also has very deep paths (its tools/ui Svelte tree) that
  # blow past Windows' 260-char MAX_PATH when packed into a Squirrel nupkg.
  - "!**/node_modules/node-llama-cpp/llama/llama.cpp/**"
  # Keep only the custom build's runtime output: Release/ holds the .node + the
  # DLLs/dylibs colocated beside it (this is the dir node-llama-cpp loads), and
  # buildDone.status + lastBuild.json are needed for it to resolve the build.
  # Drop the entire from-source build tree (CMake/MSBuild/Make scratch, the
  # llama.cpp checkout, the duplicate bin/ copy of the libs, compiler-id probes).
  # The globs are platform-agnostic (`*` matches win-x64-cuda-release-b9616 and
  # mac-arm64-metal-release-b9616 alike); the last two lines are mac-build scratch
  # (Unix Makefiles generator), the vcxproj/.lib/.exp ones are Windows (MSBuild).
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/llama.cpp/**"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/CMakeFiles/**"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/*.dir/**"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/x64/**"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/bin/**"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/*.vcxproj*"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/*.lib"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/*.exp"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/CMakeCache.txt"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/cmake_install.cmake"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/Makefile"
  - "!**/node_modules/node-llama-cpp/llama/localBuilds/*/compile_commands.json"
# node-llama-cpp ships native .node bindings and prebuilt llama.cpp binaries
# that must be kept outside the asar archive so they can be dlopen-ed at runtime.
asarUnpack:
  - node_modules/node-llama-cpp/**/*
  - node_modules/@node-llama-cpp/**/*
# We build only the unpacked app dir here (`electron-builder --win --dir`);
# `scripts/squirrel.mjs` (electron-winstaller) wraps it into the Squirrel.Windows
# installer + update package. So no NSIS/installer target, and no electron-updater
# `publish` provider — auto-update is Electron's native (Squirrel) updater reading
# straight from GitHub releases (see src/main/updater.ts).
win:
  icon: build/icon.ico
# macOS build. Unlike Windows there's no Squirrel step — electron-builder emits the
# distributable (.dmg + .zip) directly. Apple Silicon (arm64) only: the shipped
# node-llama-cpp backend is @node-llama-cpp/mac-arm64-metal (Metal GPU). Intel Macs
# would need the mac-x64 prebuilt + a separate/universal build.
#
# UNSIGNED (identity: null), matching the unsigned Windows build. Without an Apple
# Developer ID we can't sign or notarize, so Gatekeeper quarantines the download —
# first launch needs right-click → Open (or `xattr -dr com.apple.quarantine`). This
# is also why there's no in-app updater on macOS (Squirrel.Mac requires signing);
# src/main/updater.ts reports `unsupported` and the user re-downloads the DMG.
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
